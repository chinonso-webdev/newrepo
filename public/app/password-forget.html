<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
$(document).ready(function(){
        $('#login_form').on('submit', function(e){
            e.preventDefault();

             var useremail = $('#useremail').val();
             var emailFormat = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
              
             $(".response").html("Loading...<div class='spinner-border spinner-border-sm' role='status'><span class='sr-only'>Loading...</span></div>")

             if(useremail==''){
              $(".response").html("<div class='alert flex rounded-lg bg-warning px-4 py-4 text-white sm:px-5'><p>All field Required !</p></div>");
              setTimeout(function(){
                 $(".response").html("")
              }, 6000);
              return false;
            }

            if(!emailFormat.test(useremail)) {
               $(".response").html("<div class='alert flex rounded-lg bg-warning px-4 py-4 text-white sm:px-5'><p>invalid email format !</p></div>");
               setTimeout(function(){
                 $(".response").html("")
               }, 5000);
              return false;
            }

            $.ajax({
                type: "POST",
                url: 'process/pass_otp.php',
                data: {useremail :useremail},
                dataType:"json",
                success: function(data){
                   $(".response").html(data.content);
                   if(data.content=='Successful'){
                      $(".response").html(data.content);
                   }else
                   if(data.content=='Error'){
                     $(".response").html(data.content);
                    }
                },
                error: function(data, errorThrown){
               Swal.fire('The Internet?','Check network connection!','question');
               }
            });
        });
    });
</script>
